apiVersion: v1
metadata:
  name: onsen-config
data:
  onsen.toml: |+
    debug = true
    log_path = ""
    skip_tls_verification = true
    address = "http://10.10.0.1:50051"

    [storage]
    location = "/tmp/onsen"
    
    [miko]
    address = "https://miko-tls-service.default.svc.cluster.local:8443"
    
kind: ConfigMap
