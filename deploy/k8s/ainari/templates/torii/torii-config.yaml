apiVersion: v1
metadata:
  name: torii-config
data:
  torii.toml: |+
    debug = true
    log_path = ""
    skip_tls_verification = true

    [api]
    public_ip = "0.0.0.0"
    public_port = 11419
    internal_ip = "0.0.0.0"
    internal_port = 10419

    [database]
    file_path = "/etc/ainari/torii/torii_db"
    
    [miko]
    address = "https://miko-tls-service.{{ .Release.Namespace }}.svc.model.local:8443"

    [ports]
    min_port = {{ .Values.torii.port_range.start }}
    max_port = {{ .Values.torii.port_range.end }}

kind: ConfigMap
