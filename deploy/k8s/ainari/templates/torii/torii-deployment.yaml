apiVersion: apps/v1
kind: Deployment
metadata:
  name: torii
  labels:
    app: torii
spec:
  replicas: {{ .Values.torii.replica_count }}
  selector:
    matchLabels:
      app: torii
  template:
    metadata:
      labels:
        app: torii
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: torii-node
                operator: In
                values:
                - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - torii
            topologyKey: kubernetes.io/hostname
      containers:
      - name: torii
        image: {{ .Values.torii.docker.repository }}:{{ .Values.torii.docker.tag }}
        imagePullPolicy: {{ .Values.torii.docker.pull_policy }}
        env:
        - name: RUST_LOG
          value: "debug"
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: internal-api-key
              key: internal_api_key
        volumeMounts:
        - name: data-volume
          mountPath: /etc/ainari/torii/
        - name: torii-config
          mountPath: /etc/ainari/torii.toml
          subPath: torii.toml
          readOnly: true
        readinessProbe:
          exec:
            command:
            - curl
            - --fail
            - localhost:10419/v1alpha/is_ready
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - curl
            - --fail
            - localhost:10419/v1alpha/is_ready
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
  
      - name: tls-termination
        image: nginx:latest
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/nginx/certs
        - name: torii-nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"

      volumes:
        - name: torii-config
          configMap:
            name: torii-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: torii-pvc
        - name: tls-certs
          secret:
            secretName: torii-selfsigned-secret
        - name: torii-nginx-config
          configMap:
            name: torii-nginx-config
