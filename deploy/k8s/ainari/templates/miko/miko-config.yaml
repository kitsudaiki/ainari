apiVersion: v1
metadata:
  name: miko-config
data:
  miko.toml: |+
    debug = true
    log_path = ""

    [auth]
    token_key_path = "/etc/ainari/token_key"
    token_expire_time = {{ .Values.token.expire_time }}

    [api]
    ip = "127.0.0.1"
    port = 11417

    [database]
    file_path = "/etc/ainari/miko/miko_db"

    [endpoints.hanami]
    public_address = "https://hanami-tls-service.default.svc.cluster.local"
    public_port = 8443

    [endpoints.bento]
    public_address = "https://bento-tls-service.default.svc.cluster.local"
    public_port = 8443

kind: ConfigMap
