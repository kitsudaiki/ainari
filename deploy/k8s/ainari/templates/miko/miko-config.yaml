apiVersion: v1
metadata:
  name: miko-config
data:
  miko.toml: |+
    debug = true
    log_path = ""

    [auth]
    token_key_path = "/etc/ainari/token_key"
    token_expire_time = {{ .Values.token.expire_time }}

    [api]
    ip = "127.0.0.1"
    port = 11417

    [database]
    file_path = "/etc/ainari/miko/miko_db"

kind: ConfigMap
