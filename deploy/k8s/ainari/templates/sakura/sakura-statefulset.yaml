apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sakura
  labels:
    app: sakura
spec:
  replicas: {{ .Values.sakura.replica_count }}
  selector:
    matchLabels:
      app: sakura
  template:
    metadata:
      labels:
        app: sakura
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: sakura-node
                operator: In
                values:
                - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - sakura
            topologyKey: kubernetes.io/hostname
      containers:
      - name: sakura
        image: {{ .Values.sakura.docker.repository }}:{{ .Values.sakura.docker.tag }}
        imagePullPolicy: {{ .Values.sakura.docker.pull_policy }}
        env:
        - name: RUST_LOG
          value: "debug,h2=info"
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: internal-api-key
              key: internal_api_key
        - name: SAKURA_REGISTRATION_KEY
          valueFrom:
            secretKeyRef:
              name: sakura-registration-key
              key: sakura_retistration_key
        volumeMounts:
        - name: data-volume
          mountPath: /etc/ainari/sakura/
        - name: sakura-config
          mountPath: /etc/ainari/sakura.toml
          subPath: sakura.toml
          readOnly: true
        - name: wg-secret
          mountPath: /etc/wireguard
          readOnly: true
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE

      - name: tls-termination
        image: nginx:latest
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/nginx/certs
        - name: sakura-nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"

      volumes:
        - name: sakura-config
          configMap:
            name: sakura-config
        - name: tls-certs
          secret:
            secretName: sakura-selfsigned-secret
        - name: sakura-nginx-config
          configMap:
            name: sakura-nginx-config
        - name: wg-secret
          secret:
            secretName: wg-sakura-secret

  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: {{ .Values.sakura.storage.storage_class }}
      resources:
        requests:
          storage: 100Mi
