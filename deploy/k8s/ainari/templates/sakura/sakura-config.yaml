apiVersion: v1
metadata:
  name: sakura-config
data:
  sakura.toml: |+
    debug = true
    log_path = ""
    skip_tls_verification = true
    address = "https://sakura-tls-service.default.svc.cluster.local:8443"

    [processing]
    max_number_of_threads = {{ .Values.processing.max_number_of_threads }}

    [storage]
    tempfile_location = "/tmp/sakura"

    [api]
    public_ip = "127.0.0.1"
    public_port = 11420
    internal_ip = "127.0.0.1"
    internal_port = 10420

    [database]
    file_path = "/etc/ainari/sakura/sakura_db"
    
    [miko]
    address = "https://miko-tls-service.default.svc.cluster.local:8443"

kind: ConfigMap
