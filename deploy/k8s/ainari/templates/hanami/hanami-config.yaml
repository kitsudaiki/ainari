apiVersion: v1
metadata:
  name: hanami-config
data:
  hanami.toml: |+
    debug = true
    log_path = ""
    insecure_clients = true

    [api]
    public_ip = "127.0.0.1"
    public_port = 11418
    internal_ip = "127.0.0.1"
    internal_port = 10418
    internal_api_key = "{{ .Values.api.internal_api_key }}"

    [database]
    file_path = "/etc/ainari/hanami/hanami_db"
    
    [miko]
    address = "https://miko-tls-service.default.svc.cluster.local"
    port = 8443

kind: ConfigMap
