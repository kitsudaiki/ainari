site_name: Ainari-docs
site_author: Tobias Anker
site_url: https://docs.ainari.cloud

repo_name: kitsudaiki/ainari
repo_url: https://github.com/kitsudaiki/ainari

theme:
  name: material
  language: en
  logo: img/ainari-logo-pink.png
  palette:
    scheme: default  # or "slate" for dark
  features:
    - navigation.tabs
    # - navigation.sections
    - navigation.expand
    - navigation.prune
    - navigation.top
    - navigation.path
    - content.code.annotate
    - content.tabs.link

nav:
  - Home:
    - index.md
    - home/overview.md
    - home/license.md
    - home/CHANGELOG.md
    - home/ROADMAP.md
  - User-Docu:
    - CLI and SDK:
      - user/cli_sdk/cli_sdk_docu.md
      - user/cli_sdk/example_workflow.md
    - Dashboard:
      - user/dashboard/dashboard.md
    - Rest-API:
      - user/rest_api/rest_api_docu_sakura.md
      - user/rest_api/rest_api_docu_hanami.md
      - user/rest_api/rest_api_docu_miko.md
      - user/rest_api/rest_api_docu_ryokan.md
      - user/rest_api/rest_api_docu_torii.md
      - user/rest_api/rest_api_docu_omamori.md
  - Deployer/Admin-Docu:
    - Installation:
      - deployer/installation/kubernetes_installation.md
    - Configuration:
      - deployer/config/sakura_config.md
      - deployer/config/hanami_config.md
      - deployer/config/miko_config.md
      - deployer/config/ryokan_config.md
      - deployer/config/torii_config.md
      - deployer/config/omamori_config.md
      - deployer/config/onsen_config.md
    - Database:
      - deployer/database/sakura_db.md
      - deployer/database/hanami_db.md
      - deployer/database/miko_db.md
      - deployer/database/ryokan_db.md
      - deployer/database/torii_db.md
      - deployer/database/omamori_db.md
  - Development-Docu:
    - Inner workings:
      - developer/inner_workings/core/core.md
      - developer/inner_workings/measurements/measurements.md
      - developer/inner_workings/monitoring/monitoring.md
      - developer/inner_workings/storage.md
      - developer/inner_workings/user_and_projects.md
    - Repo:
      - developer/repo/repo_structure.md
      - developer/repo/build_guide.md
      - developer/repo/development.md
      - developer/repo/dependencies.md
      - developer/repo/git_workflow.md
      - developer/repo/glossar.md
  
plugins:
    - swagger-ui-tag
    - search
    - drawio-exporter:
        # Diagrams are cached to speed up site generation. The default path is
        # drawio-exporter, relative to the documentation directory.
        cache_dir: 'drawio-exporter'
        # Path to the Draw.io executable:
        #   * drawio on Linux
        #   * draw.io on macOS
        #   * or draw.io.exe on Windows
        # We'll look for it on your system's PATH, then default installation
        # paths. If we can't find it we'll warn you.
        drawio_executable: null
        # Additional Draw.io CLI args
        #   * --embed-svg-images will embed external images in SVGS, if format is "svg".
        drawio_args: []
        # Output format (see draw.io --help | grep format)
        format: svg
        # Embed format
        #   * The default is to embed via the <img> tag.
        #   * Consider <object type="image/svg+xml" data="{img_src}"></object>
        #     to enable interactive elements (like hyperlinks) in SVGs.
        #   * Consider {content} to inline SVGs into documents directly, useful
        #     for styling with CSS, preserving interactivity, and improving
        #     search by indexing diagram text.
        embed_format: '<img alt="{img_alt}" src="{img_src}">'
        # Glob pattern for matching source files
        sources: '*.drawio'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

copyright: all rights reserved; 2022-2025 Tobias Anker

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kitsudaiki
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tobiasanker42
