site_name: Ainari-docs
site_author: Tobias Anker
site_url: https://docs.ainari.cloud

repo_name: kitsudaiki/ainari
repo_url: https://github.com/kitsudaiki/ainari

theme:
  name: material
  language: en
  logo: img/ainari-logo-pink.png
  palette:
    scheme: default  # or "slate" for dark
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.prune
    - navigation.top
    - content.code.annotate
    - content.tabs.link

nav:
  - Home:
    - index.md
    - home/license.md
    - home/CHANGELOG.md
    - home/ROADMAP.md
  - Frontend:
    - frontend/example_workflow.md
    - frontend/rest_api_documentation.md
    - frontend/cli_sdk_docu.md
    - frontend/cluster_templates/cluster_template.md
    - frontend/dashboard/dashboard.md
  - Backend:
    - backend/installation.md
    - backend/config.md
    - backend/db.md
  - Inner workings:
    - inner_workings/core/core.md
    - inner_workings/measurements/measurements.md
    # - inner_workings/input_processing/input_processing.md
    - inner_workings/monitoring/monitoring.md
    - inner_workings/storage.md
    - inner_workings/user_and_projects.md
  - Development:
    - repo/repo_structure.md
    - repo/build_guide.md
    - repo/development.md
    - repo/dependencies.md
    - repo/git_workflow.md
    - repo/glossar.md

plugins:
    - swagger-ui-tag
    - search
    - drawio-exporter:
        # Diagrams are cached to speed up site generation. The default path is
        # drawio-exporter, relative to the documentation directory.
        cache_dir: 'drawio-exporter'
        # Path to the Draw.io executable:
        #   * drawio on Linux
        #   * draw.io on macOS
        #   * or draw.io.exe on Windows
        # We'll look for it on your system's PATH, then default installation
        # paths. If we can't find it we'll warn you.
        drawio_executable: null
        # Additional Draw.io CLI args
        #   * --embed-svg-images will embed external images in SVGS, if format is "svg".
        drawio_args: []
        # Output format (see draw.io --help | grep format)
        format: svg
        # Embed format
        #   * The default is to embed via the <img> tag.
        #   * Consider <object type="image/svg+xml" data="{img_src}"></object>
        #     to enable interactive elements (like hyperlinks) in SVGs.
        #   * Consider {content} to inline SVGs into documents directly, useful
        #     for styling with CSS, preserving interactivity, and improving
        #     search by indexing diagram text.
        embed_format: '<img alt="{img_alt}" src="{img_src}">'
        # Glob pattern for matching source files
        sources: '*.drawio'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

copyright: all rights reserved; 2022-2025 Tobias Anker

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kitsudaiki
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tobiasanker42
