version: 2

updates:
  - package-ecosystem: pip
    directory: "/src/sdk/python/ainari_sdk/"
    schedule:
      interval: daily
      time: "12:00"
    labels:
      - "L: Python"
      - "Env: Dependencies"
    groups:
      python-packages:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    assignees:
      - "kitsudaiki"
    ignore:
      - dependency-name: 'protobuf'
        # Must be pinned to a maximum of version 3.20.3
        # see https://github.com/protocolbuffers/protobuf/issues/10051
        versions: '> 3.20.3'

  - package-ecosystem: gomod
    directory: "/src/cli/ainarictl/"
    schedule:
      interval: daily
      time: "12:00"
    labels:
      - "L: Go"
      - "Env: Dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    assignees:
      - "kitsudaiki"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: daily
      time: "12:00"
    labels:
      - "L: Rust"
      - "Env: Dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    assignees:
      - "kitsudaiki"