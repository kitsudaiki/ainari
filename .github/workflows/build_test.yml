        run: |
          if [[ ${GITHUB_REF#} == refs/tags/* ]]; then \
              echo "HELM_VERSION=$(echo ${GITHUB_REF#refs/tags/} | sed 's/^v//')" | sed 's#/#\-#' >> $GITHUB_ENV; \
          else \
