syntax = "proto3";

package data; 

service DataService {
  // Client-side streaming RPC: client streams DataChunk messages, server replies once.
  rpc UploadFile(stream DataChunk) returns (DataResponse);

  // server -> client streaming (download)
  rpc DownloadFile(DownloadRequest) returns (stream DataChunk);

  rpc DeleteFile(DeleteRequest) returns (DataResponse);

  rpc GetDatasetDimension(DatasetDimensionRequest) returns (DatasetDimensionResponse);
}

message DataChunk {
  string remote_file_path = 1;
  bytes chunk = 2;
  int64 chunk_number = 3;
  bool eof = 4;
}


message DownloadRequest {
  string remote_file_path = 1;
}

message DeleteRequest {
  string remote_file_path = 1;
}

message DatasetDimensionRequest {
  string remote_file_path = 1;
}


message DataResponse {
  string status = 1;
}

message DatasetDimensionResponse {
  string status = 1;
  int64 number_of_rows = 2;
  int64 number_of_columns = 3;
}
